name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "src/**"          # re-deploy when source changes
      - "doc-gen/**"      # re-deploy when doc-gen files change
  workflow_dispatch:      # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate docs
        run: python doc-gen/gen.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc-gen/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
