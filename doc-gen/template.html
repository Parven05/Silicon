<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silicon Doc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script id="toc-data"  type="application/json">{{toc_json}}</script>
<script id="meta-data" type="application/json">{"item_count":{{item_count}},"generated_at":"{{generated_at}}"}</script>

<!-- Sidebar -->
<aside id="sidebar">
    <div id="sidebar-header">
        <span id="sidebar-title">Silicon</span>
        <span id="sidebar-count"></span>
        <div id="sidebar-header-btns">
            <button id="sb-expand-all"   title="Expand all groups">&#8862;</button>
            <button id="sb-collapse-all" title="Collapse all groups">&#8863;</button>
        </div>
    </div>
    <div id="sidebar-content"></div>
    <div id="sidebar-footer">Generated <span id="gen-time"></span></div>
</aside>

<!-- Resize handle -->
<div id="sidebar-resize" title="Drag to resize sidebar"></div>

<!-- Main -->
<main id="main">
    <header>
        <div id="header-left">
            <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar (S)">&#9776;</button>
            <div>
                <div id="title-row">
                    <h1>Silicon <span id='title-sub'>an OpenGL Renderer</span></h1>
                    <a id="github-link" href="https://github.com/Parven05/Silicon" target="_blank" rel="noopener" title="View on GitHub"><svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
                </div>
                <div class="tagline">Code Documentation</div>
            </div>
        </div>
        <div id="header-right">
            <button id="theme-toggle" class="icon-btn" title="Toggle theme (T)">&#9680;</button>
        </div>
    </header>

    <!-- Toolbar -->
    <div id="toolbar">
        <input type="text" id="search" placeholder="Filter by name..." autocomplete="off" spellcheck="false">
        <div id="filter-btns">
            <button class="filter-btn active" data-cat="ALL">All <span class="filter-count"></span></button>
            <button class="filter-btn" data-cat="STRUCT" style="--btn-color:var(--badge-struct-fg)">Struct <span class="filter-count"></span></button>
            <button class="filter-btn" data-cat="ENUM"   style="--btn-color:var(--badge-enum-fg)">Enum <span class="filter-count"></span></button>
            <button class="filter-btn" data-cat="PROC"   style="--btn-color:var(--badge-proc-fg)">Proc <span class="filter-count"></span></button>
            <button class="filter-btn" data-cat="UNION"  style="--btn-color:var(--badge-union-fg)">Union <span class="filter-count"></span></button>
        </div>
        <div id="toolbar-right">
            <button id="back-btn"     title="Go back (Alt+Left)">&#8592;</button>
            <button id="expand-all"   title="Expand all">&#8862;</button>
            <button id="collapse-all" title="Collapse all">&#8863;</button>
        </div>
    </div>

    <!-- Content -->
    <div id="api-root">{{content}}</div>

    <!-- No results message -->
    <div id="no-results" aria-hidden="true">
        <div id="no-results-icon">&#8708;</div>
        <div id="no-results-text">No symbols match</div>
        <div id="no-results-sub">Try a different name or category</div>
    </div>
</main>

<script>
"use strict";

// ============================================================================
// 1. Data
// ============================================================================
var TOC  = JSON.parse(document.getElementById("toc-data").textContent);
var META = JSON.parse(document.getElementById("meta-data").textContent);

document.getElementById("sidebar-count").textContent = META.item_count + " symbols";
document.getElementById("gen-time").textContent = META.generated_at;

var SYMBOL_MAP = Object.create(null);
Object.entries(TOC).forEach(function (entry) {
    entry[1].forEach(function (sym) {
        if (!SYMBOL_MAP[sym.name]) SYMBOL_MAP[sym.name] = sym.id;
    });
});

// ============================================================================
// 2. Syntax highlighter — Odin-aware, single-pass
// ============================================================================
(function () {
    var RULES = [
        // Strings & comments first — protect internals from keyword matches
        { cls: "cm",  re: /\/\*[\s\S]*?\*\//g },
        { cls: "cm",  re: /\/\/[^\n]*/g },
        { cls: "str", re: /`[^`]*`/g },
        { cls: "str", re: /"(?:[^"\\]|\\.)*"/g },
        { cls: "str", re: /'(?:[^'\\]|\\.)*'/g },

        // Declaration names — before keyword rule so names aren't double-coloured
        { cls: "fn",  re: /\b([A-Za-z_]\w*)(\s*::\s*proc\b)/g,                  cap: true },
        { cls: "ty",  re: /\b([A-Za-z_]\w*)(\s*::\s*(?:struct|enum|union)\b)/g, cap: true },

        // Directives & attributes
        { cls: "dr",  re: /#[a-z_]+/g },
        { cls: "at",  re: /@(?:\([^)]*\)|\w+)/g },

        // Keywords
        { cls: "kw",  re: /\b(?:package|import|proc|struct|enum|union|bit_set|map|dynamic|matrix|return|defer|if|else|when|for|switch|case|break|continue|fallthrough|using|context|foreign|distinct|where|do|in|not_in|or_else|or_return|auto_cast|cast|transmute)\b/g },

        // Built-in types (includes b8/b16/b32/b64 and cstring)
        { cls: "ty",  re: /\b(?:bool|b8|b16|b32|b64|byte|rune|string|cstring|rawptr|any|typeid|int|uint|uintptr|i8|i16|i32|i64|i128|u8|u16|u32|u64|u128|f16|f32|f64|f16le|f16be|f32le|f32be|f64le|f64be|complex32|complex64|complex128|quaternion64|quaternion128|quaternion256)\b/g },

        // Boolean & nil
        { cls: "bl",  re: /\b(?:true|false|nil)\b/g },

        // Built-in procedures (expanded list)
        { cls: "bi",  re: /\b(?:len|cap|size_of|align_of|offset_of|type_of|type_info_of|typeid_of|make|new|new_clone|free|free_all|delete|append|append_elem|append_elems|append_nothing|assign_at|clear|reserve|resize|shrink|copy|unordered_remove|ordered_remove|pop|push|swizzle|complex|real|imag|conj|expand_to_tuple|min|max|abs|clamp|assert|panic|unreachable|print|println|printf|fprintf|sprintf|eprintf|eprintln|eprintfln|assertf|panicf)\b/g },

        // Numeric literals — hex, binary, octal, float, int with _ separators
        { cls: "nm",  re: /\b(?:0x[\da-fA-F][\da-fA-F_]*|0b[01][01_]*|0o[0-7][0-7_]*|\d[\d_]*(?:\.[\d_]+)?(?:[eE][+-]?\d[\d_]*)?i?)\b/g },

        // :: and := get distinct classes so they stand out clearly
        { cls: "dc",  re: /::/g },
        { cls: "as",  re: /:=/g },
        // Pointer prefix ^
        { cls: "pt",  re: /\^/g },
        // Return type arrow ->
        { cls: "ar",  re: /->/g },
        // Range ..
        { cls: "op",  re: /\.\./g },
        // Remaining operators
        { cls: "op",  re: /[+\-*/%=<>!&|~?]+/g },
    ];

    function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    var _covered = new Uint8Array(0);

    function highlight(raw) {
        var n = raw.length;
        if (_covered.length < n) { _covered = new Uint8Array(n * 2); }
        else { _covered.fill(0, 0, n); }
        var matches = [];
        for (var ri = 0; ri < RULES.length; ri++) {
            var rule = RULES[ri];
            rule.re.lastIndex = 0;
            var m;
            while ((m = rule.re.exec(raw)) !== null) {
                var hlStart = m.index;
                var hlEnd   = rule.cap ? m.index + m[1].length : m.index + m[0].length;
                var skip = false;
                for (var i = hlStart; i < hlEnd; i++) { if (_covered[i]) { skip = true; break; } }
                if (skip) continue;
                for (var j = hlStart; j < hlEnd; j++) _covered[j] = 1;
                matches.push([hlStart, hlEnd, rule.cls]);
            }
        }
        matches.sort(function (a, b) { return a[0] - b[0]; });
        var out = "", pos = 0;
        for (var k = 0; k < matches.length; k++) {
            var s = matches[k][0], e = matches[k][1], cls = matches[k][2];
            if (s > pos) out += esc(raw.slice(pos, s));
            out += "<span class=\"hl-" + cls + "\">" + esc(raw.slice(s, e)) + "</span>";
            pos = e;
        }
        if (pos < n) out += esc(raw.slice(pos));
        return out;
    }

    window.highlightAll = function (root) {
        var els = (root || document).querySelectorAll("code.language-odin:not([data-hl])");
        for (var i = 0; i < els.length; i++) {
            els[i].dataset.hl = "1";
            els[i].innerHTML  = highlight(els[i].textContent);
        }
    };
}());

// ============================================================================
// 3. Cross-reference linker
//
// Fix: after highlighting, identifiers live inside <span class="hl-*"> nodes,
// NOT in raw text nodes. The old linker only walked text nodes so it missed
// almost every symbol reference.
//
// New approach — walk every direct child of <code>:
//   text nodes  → scan for symbols in punctuation/whitespace runs
//   span.hl-fn / .hl-ty / .hl-bi → if textContent is a known symbol, wrap
//                                    its inner content in a <a class="sym-link">
//   span.hl-cm / .hl-str / .hl-kw → skip entirely (don't link inside these)
// ============================================================================
(function () {
    var LINKABLE = { "hl-fn": true, "hl-ty": true, "hl-bi": true };
    var SKIP_CLS = { "hl-cm": true, "hl-str": true, "hl-kw": true,
                     "hl-dr": true, "hl-at": true,  "hl-nm": true,
                     "hl-bl": true, "hl-dc": true,  "hl-as": true };

    var IDENT_RE = /\b([A-Za-z_]\w*)\b/g;

    function makeLink(word, targetId) {
        var a = document.createElement("a");
        a.className   = "sym-link";
        a.href        = "#" + targetId;
        a.textContent = word;
        a.title       = "Go to " + word;
        a.onclick = (function (id) {
            return function (ev) { ev.preventDefault(); navigateTo(id); };
        }(targetId));
        return a;
    }

    function linkTextNode(node, selfName) {
        var text = node.nodeValue;
        IDENT_RE.lastIndex = 0;
        var m, parts = [], pos = 0, any = false;
        while ((m = IDENT_RE.exec(text)) !== null) {
            var word = m[1];
            if (word === selfName || !SYMBOL_MAP[word]) continue;
            if (m.index > pos) parts.push(document.createTextNode(text.slice(pos, m.index)));
            parts.push(makeLink(word, SYMBOL_MAP[word]));
            pos = m.index + word.length;
            any = true;
        }
        if (!any) return;
        if (pos < text.length) parts.push(document.createTextNode(text.slice(pos)));
        var parent = node.parentNode;
        parts.forEach(function (n) { parent.insertBefore(n, node); });
        parent.removeChild(node);
    }

    function linkSpan(span, selfName) {
        var word = span.textContent;
        if (!word || word === selfName || !SYMBOL_MAP[word]) return;
        if (span.querySelector("a.sym-link")) return; // already linked
        var a = makeLink(word, SYMBOL_MAP[word]);
        while (span.firstChild) a.appendChild(span.firstChild);
        span.appendChild(a);
    }

    window.linkAll = function (root) {
        var els = (root || document).querySelectorAll("code.language-odin[data-hl]:not([data-linked])");
        for (var i = 0; i < els.length; i++) {
            var el = els[i];
            el.dataset.linked = "1";
            var details  = el.closest("details");
            var selfName = details ? (details.querySelector(".item-name") || {}).textContent || "" : "";
            var children = Array.from(el.childNodes);
            children.forEach(function (node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    linkTextNode(node, selfName);
                } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName === "SPAN") {
                    if (SKIP_CLS[node.className]) return;
                    if (LINKABLE[node.className]) linkSpan(node, selfName);
                }
            });
        }
    };
}());


// ============================================================================
// 4. Navigation history
// ============================================================================
var NAV_HISTORY = [];

function navigateTo(itemId, pushHistory) {
    var el = document.getElementById(itemId);
    if (!el) return;
    if (pushHistory !== false) {
        var current = window.location.hash.slice(1);
        if (current && current !== itemId) {
            NAV_HISTORY.push(current);
            if (NAV_HISTORY.length > 20) NAV_HISTORY.shift();
        }
    }
    el.open = true;
    window.highlightAll(el);
    window.linkAll(el);
    el.scrollIntoView({ behavior: "smooth", block: "start" });
    el.classList.add("flash");
    setTimeout(function () { el.classList.remove("flash"); }, 800);
    // Update URL hash for shareability, but use a state marker so
    // we can detect on reload that this wasn't a fresh navigation
    history.replaceState({ navType: "internal" }, "", "#" + itemId);
    updateBackBtn();
    updateActiveSidebarLink(itemId);
}

function updateBackBtn() {
    document.getElementById("back-btn").disabled = NAV_HISTORY.length === 0;
}

// ============================================================================
// 5. App bootstrap
// ============================================================================
document.addEventListener("DOMContentLoaded", function () {

    window.highlightAll();
    window.linkAll();
    updateBackBtn();

    // Anchor on load — only follow the hash if the user explicitly navigated
    // here via a shared link (performance.navigation.type === 0 means a fresh
    // navigation, not a reload). On reload we clear the hash so the page always
    // starts at the top with everything collapsed.
    (function () {
        var hash = window.location.hash.slice(1);
        if (!hash) return;

        // TYPE_RELOAD = 1, TYPE_BACK_FORWARD = 2 — clear hash, start fresh
        // If the state has our internal marker, this is a reload after
        // in-page navigation — clear hash and start fresh at top
        if (history.state && history.state.navType === "internal") {
            history.replaceState(null, "", window.location.pathname);
            return;
        }
        // Also catch browser reload/back via performance API as fallback
        var navType = (performance && performance.navigation)
            ? performance.navigation.type
            : -1;
        if (navType === 1 || navType === 2) {
            history.replaceState(null, "", window.location.pathname);
            return;
        }

        // Fresh navigation with a hash (shared link) — open and scroll to it
        var el = document.getElementById(hash);
        if (!el) return;
        el.open = true;
        window.highlightAll(el);
        window.linkAll(el);
        setTimeout(function () { el.scrollIntoView({ behavior: "smooth", block: "start" }); }, 80);
    }());

    // Lazy highlight/link on details open
    document.addEventListener("toggle", function (e) {
        if (e.target.tagName === "DETAILS") {
            e.target.classList.toggle("is-open", e.target.open);
            if (e.target.open) { window.highlightAll(e.target); window.linkAll(e.target); }
        }
    }, true);

    // ref-link clicks
    document.getElementById("api-root").addEventListener("click", function (e) {
        var a = e.target.closest(".ref-link");
        if (!a) return;
        e.preventDefault();
        navigateTo(a.getAttribute("href").slice(1));
    });

    // =========================================================================
    // Sidebar build
    // =========================================================================
    var sidebarContent = document.getElementById("sidebar-content");
    // Map from pkg safeId -> { hdr, list, isCollapsed } for expand/collapse all
    var sidebarGroups = [];

    // Category icon labels
    var CAT_ICON = { STRUCT: "S", ENUM: "E", PROC: "P", UNION: "U" };

    Object.entries(TOC).forEach(function (entry) {
        var pkg    = entry[0];
        var syms   = entry[1];
        var safeId = pkg.replace(/[/\\.]/g, "-");

        var group = document.createElement("div");
        group.className = "toc-group";

        // Header
        var hdr = document.createElement("div");
        hdr.className  = "toc-pkg";
        hdr.dataset.id = safeId;

        var pkgLabel = document.createElement("span");
        pkgLabel.className   = "toc-pkg-label";
        // Strip path prefix and .odin extension — display basename only
        var pkgBasename = pkg.replace(/^.*[\/]/, "").replace(/\.odin$/i, "");
        pkgLabel.textContent    = pkgBasename;
        pkgLabel.dataset.rawPkg = pkg;  // full path for scroll-spy matching

        var pkgCount = document.createElement("span");
        pkgCount.className   = "toc-pkg-count";
        pkgCount.textContent = syms.length;

        var arrow = document.createElement("span");
        arrow.className = "toc-arrow";
        arrow.innerHTML = "&#9662;";

        hdr.appendChild(pkgLabel);
        hdr.appendChild(pkgCount);
        hdr.appendChild(arrow);

        // Symbol list
        var list = document.createElement("ul");
        list.className = "toc-list";

        // Restore collapse state — default collapsed on first visit
        var storeKey    = "toc-collapse-" + safeId;
        var stored      = localStorage.getItem(storeKey);
        var isCollapsed = stored === null ? true : stored === "1";

        function applyCollapse() {
            list.classList.toggle("collapsed", isCollapsed);
            arrow.style.transform = isCollapsed ? "rotate(-90deg)" : "";
        }

        applyCollapse();

        hdr.onclick = function () {
            isCollapsed = !isCollapsed;
            localStorage.setItem(storeKey, isCollapsed ? "1" : "0");
            applyCollapse();
        };

        // Track group for expand/collapse all
        sidebarGroups.push({
            applyCollapse: applyCollapse,
            setCollapsed: function (v) {
                isCollapsed = v;
                localStorage.setItem(storeKey, v ? "1" : "0");
                applyCollapse();
            }
        });

        // Symbol links with type icon
        syms.forEach(function (sym) {
            var li = document.createElement("li");
            var a  = document.createElement("a");
            a.href        = "#" + sym.id;
            a.className   = "toc-link toc-" + sym.cat.toLowerCase();
            a.dataset.id  = sym.id;

            // Type icon badge
            var icon = document.createElement("span");
            icon.className   = "toc-icon toc-icon-" + sym.cat.toLowerCase();
            icon.textContent = CAT_ICON[sym.cat] || sym.cat[0];

            // Name span (used for search highlight)
            var nameSpan = document.createElement("span");
            nameSpan.className   = "toc-link-name";
            nameSpan.textContent = sym.name;

            a.appendChild(icon);
            a.appendChild(nameSpan);

            a.onclick = (function (itemId) {
                return function (ev) {
                    ev.preventDefault();
                    // Auto-expand the group if it was collapsed
                    if (isCollapsed) {
                        isCollapsed = false;
                        localStorage.setItem(storeKey, "0");
                        applyCollapse();
                    }
                    navigateTo(itemId);
                };
            }(sym.id));

            li.appendChild(a);
            list.appendChild(li);
        });

        group.appendChild(hdr);
        group.appendChild(list);
        sidebarContent.appendChild(group);
    });

    // Sidebar expand / collapse all groups
    document.getElementById("sb-expand-all").onclick = function () {
        sidebarGroups.forEach(function (g) { g.setCollapsed(false); });
    };
    document.getElementById("sb-collapse-all").onclick = function () {
        sidebarGroups.forEach(function (g) { g.setCollapsed(true); });
    };

    function updateActiveSidebarLink(itemId) {
        sidebarContent.querySelectorAll(".toc-link").forEach(function (a) {
            a.classList.toggle("active", a.dataset.id === itemId);
        });
    }
    window.updateActiveSidebarLink = updateActiveSidebarLink;

    // =========================================================================
    // Scroll-spy — highlight active file section in sidebar as user scrolls
    // =========================================================================
    var allSectionsForSpy = Array.from(document.querySelectorAll(".file-section"));
    var apiRoot = document.getElementById("api-root");
    var spyTicking = false;

    function runScrollSpy() {
        spyTicking = false;
        var scrollTop = apiRoot.scrollTop;
        var viewHeight = apiRoot.clientHeight;
        var activePkg = null;

        // Find the topmost visible file section (30% threshold from top)
        for (var si = 0; si < allSectionsForSpy.length; si++) {
            var sec = allSectionsForSpy[si];
            if (sec.style.display === "none") continue;
            var rect     = sec.getBoundingClientRect();
            var rootRect = apiRoot.getBoundingClientRect();
            var relTop   = rect.top - rootRect.top;
            if (relTop <= viewHeight * 0.35) {
                activePkg = sec.querySelector(".file-header").dataset.pkg || "";
            }
        }

        // Highlight matching sidebar group header and auto-expand if collapsed
        sidebarContent.querySelectorAll(".toc-pkg").forEach(function (hdr) {
            var label   = hdr.querySelector(".toc-pkg-label");
            var rawText = label ? label.dataset.rawPkg || "" : "";
            var isActive = rawText === activePkg;
            hdr.classList.toggle("spy-active", isActive);
        });
    }

    apiRoot.addEventListener("scroll", function () {
        if (!spyTicking) {
            spyTicking = true;
            requestAnimationFrame(runScrollSpy);
        }
    }, { passive: true });

    // =========================================================================
    // Sidebar toggle
    // =========================================================================
    var sidebar     = document.getElementById("sidebar");
    var mainEl      = document.getElementById("main");
    var sidebarOpen = true;

    function setSidebar(open) {
        sidebarOpen = open;
        sidebar.classList.toggle("hidden", !open);
        mainEl.classList.toggle("sidebar-hidden", !open);
        localStorage.setItem("sidebar", open ? "1" : "0");
    }

    setSidebar(localStorage.getItem("sidebar") !== "0");
    document.getElementById("sidebar-toggle").onclick = function () { setSidebar(!sidebarOpen); };

    // =========================================================================
    // Theme toggle
    // =========================================================================
    var htmlEl = document.documentElement;
    function setTheme(t) { htmlEl.dataset.theme = t; localStorage.setItem("theme", t); }
    setTheme(localStorage.getItem("theme") || "dark");
    document.getElementById("theme-toggle").onclick = function () {
        setTheme(htmlEl.dataset.theme === "dark" ? "light" : "dark");
    };

    // Back button
    document.getElementById("back-btn").onclick = function () {
        if (NAV_HISTORY.length === 0) return;
        var prev = NAV_HISTORY.pop();
        updateBackBtn();
        navigateTo(prev, false);
    };

    // =========================================================================
    // Search + filter + highlight matches + no-results
    // =========================================================================
    var searchEl    = document.getElementById("search");
    var filterBtns  = document.querySelectorAll(".filter-btn");
    var noResults   = document.getElementById("no-results");
    var activeCat   = "ALL";
    var allDetails  = Array.from(document.querySelectorAll("details"));
    var allSections = Array.from(document.querySelectorAll(".file-section"));

    // Category counts
    var catCounts = { ALL: allDetails.length, STRUCT: 0, ENUM: 0, PROC: 0, UNION: 0 };
    allDetails.forEach(function (el) {
        var badgeEl = el.querySelector(".badge");
        var cat = badgeEl ? badgeEl.textContent.trim() : "";
        if (catCounts[cat] !== undefined) catCounts[cat]++;
    });
    filterBtns.forEach(function (btn) {
        var countEl = btn.querySelector(".filter-count");
        if (countEl && catCounts[btn.dataset.cat] !== undefined) {
            countEl.textContent = catCounts[btn.dataset.cat];
        }
    });

    function highlightMatch(nameEl, term) {
        var text = nameEl.dataset.original || nameEl.textContent;
        nameEl.dataset.original = text;
        if (!term) {
            nameEl.textContent = text;
            return;
        }
        var lower = text.toLowerCase();
        var idx   = lower.indexOf(term);
        if (idx === -1) {
            nameEl.textContent = text;
            return;
        }
        // Build: before + <mark> + match + </mark> + after
        nameEl.innerHTML =
            esc(text.slice(0, idx)) +
            "<mark class='search-hl'>" + esc(text.slice(idx, idx + term.length)) + "</mark>" +
            esc(text.slice(idx + term.length));
    }

    function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function applyFilters() {
        var term = searchEl.value.toLowerCase();
        var sectionVisible = new Map();
        allSections.forEach(function (s) { sectionVisible.set(s, false); });
        var anyVisible = false;

        allDetails.forEach(function (el) {
            var nameEl  = el.querySelector("summary .item-name");
            var badgeEl = el.querySelector(".badge");
            var name    = nameEl  ? nameEl.textContent.toLowerCase() : "";
            var cat     = badgeEl ? badgeEl.textContent.trim()        : "";
            var visible = name.indexOf(term) !== -1 && (activeCat === "ALL" || cat === activeCat);
            el.style.display = visible ? "" : "none";
            if (visible) {
                anyVisible = true;
                var sec = el.closest(".file-section");
                if (sec) sectionVisible.set(sec, true);
            }
        });

        allSections.forEach(function (sec) {
            sec.style.display = sectionVisible.get(sec) ? "" : "none";
        });

        // Highlight matching text in sidebar links
        sidebarContent.querySelectorAll(".toc-link-name").forEach(function (nameEl) {
            highlightMatch(nameEl, term);
        });

        // Show/hide no-results
        noResults.setAttribute("aria-hidden", anyVisible ? "true" : "false");
    }

    searchEl.addEventListener("input", applyFilters);

    filterBtns.forEach(function (btn) {
        btn.onclick = function () {
            filterBtns.forEach(function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            activeCat = btn.dataset.cat;
            applyFilters();
        };
    });

    // =========================================================================
    // Expand / collapse all symbols
    // =========================================================================
    document.getElementById("expand-all").onclick = function () {
        allDetails.forEach(function (d) {
            if (d.style.display !== "none") { d.open = true; window.highlightAll(d); window.linkAll(d); }
        });
    };
    document.getElementById("collapse-all").onclick = function () {
        allDetails.forEach(function (d) { d.open = false; });
    };

    // =========================================================================
    // Copy code
    // =========================================================================
    window.copyCode = function (btn) {
        var details = btn.closest("details");
        if (!details) return;
        var code = details.querySelector("code");
        if (!code) return;
        navigator.clipboard.writeText(code.textContent).then(function () {
            var orig = btn.textContent;
            btn.textContent = "\u2713";
            btn.classList.add("copied");
            setTimeout(function () { btn.textContent = orig; btn.classList.remove("copied"); }, 1500);
        });
    };

    // =========================================================================
    // j/k navigation
    // =========================================================================
    var _jkIndex = -1;
    function getVisibleDetails() {
        return allDetails.filter(function (d) { return d.style.display !== "none"; });
    }
    function jkNavigate(dir) {
        var visible = getVisibleDetails();
        if (!visible.length) return;
        _jkIndex = Math.max(0, Math.min(visible.length - 1, _jkIndex + dir));
        var target = visible[_jkIndex];
        target.scrollIntoView({ behavior: "smooth", block: "start" });
        target.classList.add("flash");
        setTimeout(function () { target.classList.remove("flash"); }, 800);
    }

    // =========================================================================
    // Keyboard shortcuts
    // =========================================================================
    document.addEventListener("keydown", function (e) {
        if (e.target.tagName === "INPUT") {
            if (e.key === "Escape") { searchEl.value = ""; applyFilters(); searchEl.blur(); return; }
            // Enter = open first visible result
            if (e.key === "Enter") {
                var first = getVisibleDetails()[0];
                if (first) { first.open = true; window.highlightAll(first); window.linkAll(first); first.scrollIntoView({ behavior: "smooth", block: "start" }); searchEl.blur(); }
                return;
            }
            return;
        }
        switch (e.key) {
            case "s": case "S": setSidebar(!sidebarOpen); break;
            case "t": case "T": setTheme(htmlEl.dataset.theme === "dark" ? "light" : "dark"); break;
            case "j": case "J": jkNavigate(1);  break;
            case "k": case "K": jkNavigate(-1); break;
            default:
                if (e.altKey && e.key === "ArrowLeft") {
                    e.preventDefault();
                    if (NAV_HISTORY.length > 0) { var prev = NAV_HISTORY.pop(); updateBackBtn(); navigateTo(prev, false); }
                }
                if ((e.ctrlKey || e.metaKey) && e.key === "k") {
                    e.preventDefault(); searchEl.focus(); searchEl.select();
                }
        }
    });

    // =========================================================================
    // Sidebar resize drag
    // =========================================================================
    (function () {
        var handle   = document.getElementById("sidebar-resize");
        var sb       = document.getElementById("sidebar");
        var dragging = false;
        var startX, startW;
        var MIN_W = 160, MAX_W = 420;

        handle.addEventListener("mousedown", function (e) {
            dragging = true;
            startX   = e.clientX;
            startW   = sb.offsetWidth;
            handle.classList.add("dragging");
            document.body.style.cursor     = "col-resize";
            document.body.style.userSelect = "none";
        });

        document.addEventListener("mousemove", function (e) {
            if (!dragging) return;
            var w = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
            sb.style.width    = w + "px";
            sb.style.minWidth = w + "px";
            localStorage.setItem("sidebar-width", w);
        });

        document.addEventListener("mouseup", function () {
            if (!dragging) return;
            dragging = false;
            handle.classList.remove("dragging");
            document.body.style.cursor     = "";
            document.body.style.userSelect = "";
        });

        // Restore persisted width
        var saved = parseInt(localStorage.getItem("sidebar-width"), 10);
        if (saved >= MIN_W && saved <= MAX_W) {
            sb.style.width    = saved + "px";
            sb.style.minWidth = saved + "px";
        }
    }());
});
</script>
</body>
</html>
