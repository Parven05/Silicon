<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silicon Rendering Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOC data injected by gen.py into inert JSON script tags.
     These are never executed as JS, so placeholders are valid before gen.py runs. -->
<script id="toc-data"  type="application/json">{{toc_json}}</script>
<script id="meta-data" type="application/json">{"item_count": {{item_count}}}</script>

<!-- Sidebar -->
<aside id="sidebar">
    <div id="sidebar-header">
        <span id="sidebar-title">Silicon</span>
        <span id="sidebar-count"></span>
    </div>
    <div id="sidebar-content"></div>
</aside>

<!-- Main -->
<main id="main">
    <header>
        <div id="header-left">
            <button id="sidebar-toggle" title="Toggle sidebar (S)">&#9776;</button>
            <div>
                <h1>Silicon Rendering Engine</h1>
                <div class="tagline">Core Technical Documentation</div>
            </div>
        </div>
        <div id="header-right">
            <button id="theme-toggle" title="Toggle theme (T)">&#9680;</button>
        </div>
    </header>

    <!-- Toolbar -->
    <div id="toolbar">
        <input type="text" id="search" placeholder="Filter by name..." autocomplete="off" spellcheck="false">
        <div id="filter-btns">
            <button class="filter-btn active" data-cat="ALL">All</button>
            <button class="filter-btn" data-cat="STRUCT">Struct</button>
            <button class="filter-btn" data-cat="ENUM">Enum</button>
            <button class="filter-btn" data-cat="PROC">Proc</button>
            <button class="filter-btn" data-cat="UNION">Union</button>
        </div>
        <div id="toolbar-right">
            <button id="expand-all"   title="Expand all">&#8862;</button>
            <button id="collapse-all" title="Collapse all">&#8863;</button>
        </div>
    </div>

    <!-- Content -->
    <div id="api-root">{{content}}</div>
</main>

<script>
"use strict";

// ============================================================================
// 1. Read injected data (JSON script tags — never executed as JS)
// ============================================================================
var TOC  = JSON.parse(document.getElementById("toc-data").textContent);
var META = JSON.parse(document.getElementById("meta-data").textContent);

document.getElementById("sidebar-count").textContent = META.item_count + " symbols";

// ============================================================================
// 2. Odin syntax highlighter — zero dependencies, single-pass
//    Fix: capture group offset computed via regex indices, not string search,
//    so a proc named "proc" or a type named "struct" highlights correctly.
// ============================================================================
(function () {
    // Rules with cap:true use a capturing group — the group index is always 1.
    // We rely on m.index + offset computed from the match object, not indexOf,
    // to handle cases where the capture text appears earlier in the full match.
    var RULES = [
        // Block comments — highest priority; claim before anything else
        { cls: "cm",  re: /\/\*[\s\S]*?\*\//g },
        // Line comments
        { cls: "cm",  re: /\/\/[^\n]*/g },
        // Strings (double-quoted)
        { cls: "str", re: /"(?:[^"\\]|\\.)*"/g },
        // Character literals
        { cls: "str", re: /'(?:[^'\\]|\\.)*'/g },
        // Procedure name before ::  proc  — cap group 1 = the name only
        // We use a two-group pattern: (name)(whitespace :: proc) so group 1
        // is reliably the name without any ambiguity.
        { cls: "fn",  re: /\b([A-Za-z_]\w*)(\s*::\s*proc\b)/g,                cap: true },
        // Type name before :: struct/enum/union — same two-group approach
        { cls: "ty",  re: /\b([A-Za-z_]\w*)(\s*::\s*(?:struct|enum|union)\b)/g, cap: true },
        // Keywords
        { cls: "kw",  re: /\b(?:package|import|proc|struct|enum|union|bit_set|map|dynamic|return|defer|if|else|elif|for|switch|case|break|continue|fallthrough|using|context|foreign|distinct|when|where|do|in|not_in|or_else|or_return|auto_cast|cast|transmute)\b/g },
        // Built-in types
        { cls: "ty",  re: /\b(?:bool|byte|rune|string|rawptr|any|typeid|int|uint|uintptr|i8|i16|i32|i64|i128|u8|u16|u32|u64|u128|f16|f32|f64|f16le|f16be|f32le|f32be|f64le|f64be|complex32|complex64|complex128|quaternion64|quaternion128|quaternion256)\b/g },
        // Booleans and nil
        { cls: "bl",  re: /\b(?:true|false|nil)\b/g },
        // Built-in procedures — teal, not blue, to distinguish from types
        { cls: "bi",  re: /\b(?:len|cap|size_of|align_of|offset_of|type_of|type_info_of|typeid_of|make|new|free|delete|append|append_elem|append_elems|clear|reserve|resize|copy|swizzle|complex|real|imag|conj|expand_to_tuple|min|max|abs|clamp|assert|panic|print|println|printf|fprintf|sprintf|eprintf|eprintln|eprintfln)\b/g },
        // Compiler directives
        { cls: "dr",  re: /#\w+/g },
        // Attributes
        { cls: "at",  re: /@(?:\([^)]*\)|\w+)/g },
        // Numeric literals
        { cls: "nm",  re: /\b(?:0x[\da-fA-F_]+|0b[01_]+|0o[0-7_]+|\d[\d_]*(?:\.[\d_]+)?(?:[eE][+-]?\d+)?)\b/g },
        // Operators
        { cls: "op",  re: /->|::|:=|\.\.|[+\-*/%=<>!&|^~?]+/g },
    ];

    function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function highlight(raw) {
        var n       = raw.length;
        var covered = new Uint8Array(n);
        var matches = [];

        for (var ri = 0; ri < RULES.length; ri++) {
            var rule = RULES[ri];
            rule.re.lastIndex = 0;
            var m;
            while ((m = rule.re.exec(raw)) !== null) {
                var hlStart, hlEnd;
                if (rule.cap) {
                    // group 1 is the name; group 2 is the :: suffix.
                    // m.index is the start of the whole match.
                    // group 1 always starts at m.index (it is the first thing matched).
                    hlStart = m.index;
                    hlEnd   = m.index + m[1].length;
                } else {
                    hlStart = m.index;
                    hlEnd   = m.index + m[0].length;
                }

                var skip = false;
                for (var i = hlStart; i < hlEnd; i++) {
                    if (covered[i]) { skip = true; break; }
                }
                if (skip) continue;

                for (var j = hlStart; j < hlEnd; j++) covered[j] = 1;
                matches.push([hlStart, hlEnd, rule.cls]);
            }
        }

        matches.sort(function (a, b) { return a[0] - b[0]; });

        var out = "";
        var pos = 0;
        for (var k = 0; k < matches.length; k++) {
            var s = matches[k][0], e = matches[k][1], cls = matches[k][2];
            if (s > pos) out += esc(raw.slice(pos, s));
            out += "<span class=\"hl-" + cls + "\">" + esc(raw.slice(s, e)) + "</span>";
            pos = e;
        }
        if (pos < n) out += esc(raw.slice(pos));
        return out;
    }

    window.highlightAll = function (root) {
        var scope = root || document;
        var els = scope.querySelectorAll("code.language-odin:not([data-hl])");
        for (var i = 0; i < els.length; i++) {
            els[i].dataset.hl = "1";
            els[i].innerHTML = highlight(els[i].textContent);
        }
    };
}());

// ============================================================================
// 3. App bootstrap
// ============================================================================
document.addEventListener("DOMContentLoaded", function () {

    // Highlight all visible code on load
    window.highlightAll();

    // Re-highlight lazily when a <details> is opened
    document.addEventListener("toggle", function (e) {
        if (e.target.tagName === "DETAILS" && e.target.open) {
            window.highlightAll(e.target);
        }
    }, true);

    // Build sidebar from TOC data
    var sidebarContent = document.getElementById("sidebar-content");
    for (var pkg in TOC) {
        if (!Object.prototype.hasOwnProperty.call(TOC, pkg)) continue;
        var syms   = TOC[pkg];
        var safeId = pkg.replace(/[/\\.]/g, "-");

        var group = document.createElement("div");
        group.className = "toc-group";

        var hdr = document.createElement("div");
        hdr.className   = "toc-pkg";
        hdr.textContent = pkg;
        (function (id) {
            hdr.onclick = function () {
                var sec = document.getElementById("sec-" + id);
                if (sec) sec.scrollIntoView({ behavior: "smooth", block: "start" });
            };
        }(safeId));
        group.appendChild(hdr);

        var list = document.createElement("ul");
        list.className = "toc-list";
        syms.forEach(function (sym) {
            var li = document.createElement("li");
            var a  = document.createElement("a");
            // Use the collision-free id generated by gen.py
            a.href        = "#" + sym.id;
            a.className   = "toc-link toc-" + sym.cat.toLowerCase();
            a.textContent = sym.name;
            (function (itemId) {
                a.onclick = function (ev) {
                    ev.preventDefault();
                    var el = document.getElementById(itemId);
                    if (el) {
                        el.open = true;
                        el.scrollIntoView({ behavior: "smooth", block: "start" });
                    }
                };
            }(sym.id));
            li.appendChild(a);
            list.appendChild(li);
        });
        group.appendChild(list);
        sidebarContent.appendChild(group);
    }

    // Sidebar toggle
    var sidebar     = document.getElementById("sidebar");
    var mainEl      = document.getElementById("main");
    var sidebarOpen = true;

    function setSidebar(open) {
        sidebarOpen = open;
        sidebar.classList.toggle("hidden", !open);
        mainEl.classList.toggle("sidebar-hidden", !open);
        localStorage.setItem("sidebar", open ? "1" : "0");
    }

    setSidebar(localStorage.getItem("sidebar") !== "0");
    document.getElementById("sidebar-toggle").onclick = function () { setSidebar(!sidebarOpen); };

    // Theme toggle
    var htmlEl = document.documentElement;
    function setTheme(t) {
        htmlEl.dataset.theme = t;
        localStorage.setItem("theme", t);
    }
    setTheme(localStorage.getItem("theme") || "dark");
    document.getElementById("theme-toggle").onclick = function () {
        setTheme(htmlEl.dataset.theme === "dark" ? "light" : "dark");
    };

    // Search + category filter
    var searchEl   = document.getElementById("search");
    var filterBtns = document.querySelectorAll(".filter-btn");
    var activeCat  = "ALL";

    function applyFilters() {
        var term = searchEl.value.toLowerCase();
        document.querySelectorAll("details").forEach(function (el) {
            var nameEl  = el.querySelector("summary .item-name");
            var badgeEl = el.querySelector(".badge");
            var name    = nameEl  ? nameEl.textContent.toLowerCase() : "";
            var cat     = badgeEl ? badgeEl.textContent.trim()        : "";
            var nameOk  = name.indexOf(term) !== -1;
            var catOk   = activeCat === "ALL" || cat === activeCat;
            el.style.display = (nameOk && catOk) ? "" : "none";
        });
        // Hide file-section headers when all their children are filtered out
        document.querySelectorAll(".file-section").forEach(function (sec) {
            var anyVisible = false;
            sec.querySelectorAll("details").forEach(function (d) {
                if (d.style.display !== "none") anyVisible = true;
            });
            sec.style.display = anyVisible ? "" : "none";
        });
    }

    searchEl.addEventListener("input", applyFilters);

    filterBtns.forEach(function (btn) {
        btn.onclick = function () {
            filterBtns.forEach(function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            activeCat = btn.dataset.cat;
            applyFilters();
        };
    });

    // Expand / collapse all (respects current filter)
    document.getElementById("expand-all").onclick = function () {
        document.querySelectorAll("details").forEach(function (d) {
            if (d.style.display !== "none") {
                d.open = true;
                window.highlightAll(d);
            }
        });
    };

    document.getElementById("collapse-all").onclick = function () {
        document.querySelectorAll("details").forEach(function (d) { d.open = false; });
    };

    // Copy code — use closest("details") so it works regardless of
    // how deeply nested the button is inside the content div.
    window.copyCode = function (btn) {
        var code = btn.closest("details").querySelector("code");
        if (!code) return;
        navigator.clipboard.writeText(code.textContent).then(function () {
            var orig = btn.textContent;
            btn.textContent = "✓";
            btn.classList.add("copied");
            setTimeout(function () {
                btn.textContent = orig;
                btn.classList.remove("copied");
            }, 1500);
        });
    };

    // Keyboard shortcuts
    document.addEventListener("keydown", function (e) {
        if (e.target.tagName === "INPUT") {
            if (e.key === "Escape") {
                searchEl.value = "";
                applyFilters();
                searchEl.blur();
            }
            return;
        }
        if (e.key === "s" || e.key === "S") { setSidebar(!sidebarOpen); return; }
        if (e.key === "t" || e.key === "T") {
            setTheme(htmlEl.dataset.theme === "dark" ? "light" : "dark");
            return;
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "k") {
            e.preventDefault();
            searchEl.focus();
            searchEl.select();
        }
    });
});
</script>
</body>
</html>
